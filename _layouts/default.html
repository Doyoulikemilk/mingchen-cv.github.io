<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="{{ page.description | default: site.description }}">
    <title>{{ page.title | default: site.title }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;family=Source+Serif+4:opsz,wght@8..60,600;8..60,700&amp;display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ '/styles.css' | relative_url }}">
  </head>
  <body>
    <main class="page">
      <aside class="profile">
        <img class="profile-photo" src="{{ page.photo | relative_url }}" alt="Portrait of {{ page.name }}">
        <h1>{{ page.name }}</h1>
        <p class="role">{{ page.role }}</p>
        <p>{{ page.affiliation }}</p>

        <nav class="profile-links" aria-label="Profile links">
          <a href="mailto:{{ page.email }}">Email</a>
          <a href="{{ page.google_scholar }}">Google Scholar</a>
          <a href="{{ page.orcid }}">ORCID</a>
          <a href="{{ page.researchgate }}">ResearchGate</a>
        </nav>
      </aside>

      <article class="content">
        {{ content }}
      </article>
    </main>
  </body>
</html>
